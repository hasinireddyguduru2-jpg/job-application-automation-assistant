<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application Automation Assistant</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:20px;
}

.section{
margin-bottom:25px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

input, select{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 20px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

.job-card{
border:1px solid #ddd;
padding:15px;
margin-top:15px;
border-radius:8px;
background:#f8fafc;
}

.status{
margin-top:20px;
padding:15px;
background:#dcfce7;
border-radius:8px;
display:none;
}

footer{
text-align:center;
margin-top:20px;
color:#666;
}
</style>

</head>
<body>

<div class="container">

<h1>Job Application Automation Assistant</h1>

<div class="section">
<label>Upload Resume</label>
<input type="file">
</div>

<div class="section">
<label>Select Job Role</label>

<select id="role">
<option>.NET Developer</option>
<option>Java Developer</option>
<option>Python Developer</option>
<option>Full Stack Developer</option>
<option>Data Analyst</option>
</select>

<button onclick="searchJobs()">Search Jobs</button>
</div>

<div id="jobs"></div>

<div id="status" class="status">
Application submitted successfully (Demo).
</div>

<footer>
Created by Hasini Guduru
</footer>

</div>

<script>

function searchJobs(){

let role=document.getElementById("role").value;

let jobs=document.getElementById("jobs");

jobs.innerHTML=`

<div class="job-card">
<h3>${role} - Infosys</h3>
<p>Location: USA</p>
<p>Experience: 0-2 Years</p>
<button onclick="applyJob()">Apply</button>
</div>

<div class="job-card">
<h3>${role} - Capgemini</h3>
<p>Location: Remote</p>
<p>Experience: 1-3 Years</p>
<button onclick="applyJob()">Apply</button>
</div>

<div class="job-card">
<h3>${role} - Randstad</h3>
<p>Location: Hybrid</p>
<p>Experience: Fresher</p>
<button onclick="applyJob()">Apply</button>
</div>

`;

}

function applyJob(){

document.getElementById("status").style.display="block";

}

</script>

</body>
</html>
